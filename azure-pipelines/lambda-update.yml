trigger:
  branches:
    include:
      - main

  paths:
    include:
      - Lambda/test-function/*.py

pool:
  vmImage: ubuntu-latest

variables:
  AWS_REGION: ca-central-1
  FUNCTION_NAME: cst-lambda-qa

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

- script: |
    mkdir package
    cp Lambda/test-function/app.py package/

    cd package
    zip -r app.zip .
  displayName: Build Lambda Package

- task: AWSCLI@1
  displayName: Configure AWS OIDC Connection
  inputs:
    awsCredentials: aws-odic-sc
    regionName: $(AWS_REGION)
    awsCommand: sts
    awsSubCommand: get-caller-identity

- task: AWSCLI@1
  displayName: Deploy Lambda
  inputs:
    awsCredentials: aws-odic-sc #service connection name
    regionName: $(AWS_REGION)
    awsCommand: lambda
    awsSubCommand: update-function-code
    awsArguments: >
      --function-name $(FUNCTION_NAME)
      --zip-file fileb://package/app.zip