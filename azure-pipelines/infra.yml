trigger:
  branches:
    include:
      - main

  paths:
    include:
      - terraform/**

pool:
  vmImage: ubuntu-latest

variables:
  AWS_REGION: ca-central-1

steps:

# Checking whether terraform still present
- script: |
    which terraform
    terraform version
  displayName: Check Terraform

# Install Terraform
- script: |
    wget -q https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip

    unzip -o terraform_1.9.8_linux_amd64.zip

    chmod +x terraform

    ./terraform version
  displayName: Install Terraform

# Verify AWS OIDC Authentication
- task: AWSCLI@1
  displayName: Verify AWS Identity
  inputs:
    awsCredentials: aws-odic-sc
    regionName: $(AWS_REGION)
    awsCommand: sts
    awsSubCommand: get-caller-identity

# Terraform Init
- script: |
    terraform init
  workingDirectory: terraform
  displayName: Terraform Init

# Terraform Format Check
- script: |
    terraform fmt -check -recursive
  workingDirectory: terraform
  displayName: Terraform Format Check

# Terraform Validate
- script: |
    terraform validate
  workingDirectory: terraform
  displayName: Terraform Validate

# Terraform Plan
- script: |
    terraform plan -out=tfplan
  workingDirectory: terraform
  displayName: Terraform Plan

# Terraform Apply
- script: |
    terraform apply -auto-approve tfplan
  workingDirectory: terraform
  displayName: Terraform Apply